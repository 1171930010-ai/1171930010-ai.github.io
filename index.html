<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘航闻 | 个人主页</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #0f172a;
  color: #e2e8f0;
}

/* 顶部 */
.header {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px;
  background: linear-gradient(120deg,#1e293b,#0f172a);
}

.header h1 {
  font-size: 42px;
  margin: 0;
}

.header p {
  color: #94a3b8;
}

/* 通用区块 */
.section {
  max-width: 900px;
  margin: auto;
  padding: 60px 20px;
}

/* 卡片 */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* 标签 */
.tag {
  display: inline-block;
  background: #334155;
  padding: 5px 10px;
  border-radius: 6px;
  margin: 5px;
  font-size: 12px;
}

/* 可展开 */
.details {
  cursor: pointer;
  margin-top: 10px;
  color: #60a5fa;
}

/* 动画 */
.fade {
  opacity: 0;
  transform: translateY(20px);
  transition: 0.8s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<!-- 顶部 -->
<div class="header">
  <h1>刘航闻</h1>
  <p>辽宁大学经济学（拔尖计划） | 数据分析 | 科研导向</p>
  <p>📧 1171930010@qq.com</p>
</div>

<!-- 教育 -->
<div class="section fade">
  <h2>教育背景</h2>
  <div class="card">
    辽宁大学（211）<br>
    GPA：3.88/4.0（专业第2）<br>
    核心课程：计量经济学 / 金融学 / Python
  </div>
</div>

<!-- 科研 -->
<div class="section fade">
  <h2>科研成果</h2>

  <div class="card">
    <b>ESG评级与企业绿色技术创新</b>
    <div class="details" onclick="toggle(this)">展开详情</div>
    <div style="display:none">
      使用计量模型分析ESG评级对绿色创新的影响，
      论文发表于核心期刊，被引10+。
    </div>
  </div>

  <div class="card">
    ESG评级稳股市效应（会议入选）
  </div>

</div>

<!-- 项目 -->
<div class="section fade">
  <h2>竞赛项目</h2>

  <div class="card">
    <b>溪草茶饮项目</b>
    <div class="details" onclick="toggle(this)">展开详情</div>
    <div style="display:none">
      推动中草药产业商业化，
      获国家特等奖与多项省一等奖。
    </div>
  </div>

</div>

<!-- 技能 -->
<div class="section fade">
  <h2>技能</h2>
  <span class="tag">Python</span>
  <span class="tag">Stata</span>
  <span class="tag">数据分析</span>
  <span class="tag">计量经济学</span>
</div>

<script>
function toggle(el){
  let content = el.nextElementSibling;
  content.style.display =
    content.style.display === "none" ? "block" : "none";
}

// 滚动动画
let fades = document.querySelectorAll('.fade');
window.addEventListener('scroll', ()=>{
  fades.forEach(el=>{
    let rect = el.getBoundingClientRect();
    if(rect.top < window.innerHeight - 50){
      el.classList.add('show');
    }
  })
});
</script>

</body>
</html>
